# Config

# Maximum number of minecarts allowed on the same connected rail
max-minecarts-per-rail: 10

# Maximum number of minecarts allowed inside a single chunk
max-minecarts-per-chunk: 20

# Message sent to player when rail limit is reached
message-rail-limit: "&cToo many minecarts on this rail! Maximum is {limit}."

# Message sent to player when chunk limit is reached
message-chunk-limit: "&cToo many minecarts in this chunk! Maximum is {limit}."

# Log limit violations to console
log-violations: false
